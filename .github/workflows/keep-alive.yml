name: Keep Alive

on:
  schedule:
    - cron: '0 12 1 * *'  # 1st of every month at 12:00 UTC
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Keep workflow active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date > .github/last-keepalive
          git add .github/last-keepalive
          git commit -m "chore: keep workflows active [skip ci]" || echo "Nothing to commit"
          git push
